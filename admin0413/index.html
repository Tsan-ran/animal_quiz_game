<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin 0413</title>
  <style>
    :root {
      --bg: #f5f5f0;
      --panel: #fff;
      --line: #111827;
      --muted: #6b7280;
      --danger: #dc2626;
      --ok: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: #111827;
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 12px;
      box-shadow: 6px 6px 0 #000;
      padding: 16px;
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }
    input, button {
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    input { background: #fff; }
    button { cursor: pointer; background: #fff; font-weight: 700; }
    button:hover { transform: translateY(-1px); }
    .primary { background: #111827; color: #fff; }
    .danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    .status { color: var(--muted); font-size: 13px; margin: 8px 0 0; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 960px; }
    th, td {
      border-bottom: 1px solid #d1d5db;
      text-align: left;
      padding: 8px;
      vertical-align: middle;
    }
    td input { width: 100%; min-width: 120px; }
    .ops { display: flex; gap: 6px; }
    .hint { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>/admin0413</h1>
      <div class="hint">管理 localStorage key：<code>animal_quiz_local_lb</code></div>
      <div class="row">
        <button id="reload" class="primary">重新載入</button>
        <button id="add">新增一筆</button>
        <button id="clear" class="danger">清空全部</button>
      </div>
      <p id="status" class="status">尚未載入資料</p>
    </div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
            <th>Rank</th>
            <th>Date (ISO)</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'animal_quiz_local_lb';
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function esc(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseRows() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function normalize(item, index) {
      const id = Number(item.id) || Date.now() + index;
      const name = typeof item.name === 'string' ? item.name : (typeof item.nickname === 'string' ? item.nickname : '');
      const score = Number.isFinite(Number(item.score)) ? Number(item.score) : 0;
      const rank = typeof item.rank === 'string' ? item.rank : '';
      const date = item.date ? new Date(item.date).toISOString() : new Date().toISOString();
      return { id, name, score, rank, date };
    }

    function saveRows(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function renderRows(list) {
      rowsEl.innerHTML = list.map((item) => `
        <tr data-id="${item.id}">
          <td>${item.id}</td>
          <td><input data-field="name" value="${esc(item.name)}" maxlength="12" /></td>
          <td><input data-field="score" type="number" min="0" max="999" value="${item.score}" /></td>
          <td><input data-field="rank" value="${esc(item.rank)}" maxlength="20" /></td>
          <td><input data-field="date" value="${esc(item.date)}" /></td>
          <td>
            <div class="ops">
              <button data-action="save">儲存</button>
              <button data-action="delete" class="danger">刪除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function loadRows() {
      const rows = parseRows().map(normalize);
      saveRows(rows);
      renderRows(rows);
      setStatus(`已載入 ${rows.length} 筆`, 'ok');
    }

    function upsertRow(id, payload) {
      const rows = parseRows().map(normalize);
      const idx = rows.findIndex((r) => String(r.id) === String(id));
      if (idx === -1) return false;
      rows[idx] = { ...rows[idx], ...payload };
      saveRows(rows);
      return true;
    }

    function removeRow(id) {
      const rows = parseRows().map(normalize);
      const next = rows.filter((r) => String(r.id) !== String(id));
      saveRows(next);
      return rows.length !== next.length;
    }

    function addRow() {
      const rows = parseRows().map(normalize);
      rows.unshift({
        id: Date.now(),
        name: 'new_player',
        score: 0,
        rank: 'NPC',
        date: new Date().toISOString()
      });
      saveRows(rows);
      renderRows(rows);
      setStatus('已新增 1 筆', 'ok');
    }

    document.getElementById('reload').addEventListener('click', loadRows);

    document.getElementById('add').addEventListener('click', addRow);

    document.getElementById('clear').addEventListener('click', () => {
      if (!confirm('確定清空 localStorage leaderboard？')) return;
      saveRows([]);
      renderRows([]);
      setStatus('已清空資料', 'ok');
    });

    rowsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const tr = e.target.closest('tr[data-id]');
      if (!tr) return;

      const id = tr.dataset.id;
      const action = btn.dataset.action;

      if (action === 'save') {
        const payload = {
          name: tr.querySelector('[data-field="name"]').value.trim(),
          score: Number(tr.querySelector('[data-field="score"]').value),
          rank: tr.querySelector('[data-field="rank"]').value.trim(),
          date: tr.querySelector('[data-field="date"]').value.trim()
        };

        if (payload.name.length < 1 || payload.name.length > 12) {
          setStatus('名稱需 1-12 字', 'err');
          return;
        }
        if (!Number.isFinite(payload.score) || payload.score < 0) {
          setStatus('分數需為 >= 0 的數字', 'err');
          return;
        }
        try {
          payload.date = new Date(payload.date).toISOString();
        } catch {
          setStatus('日期格式錯誤', 'err');
          return;
        }

        if (upsertRow(id, payload)) {
          setStatus(`ID ${id} 已更新`, 'ok');
          loadRows();
        } else {
          setStatus(`ID ${id} 不存在`, 'err');
        }
      }

      if (action === 'delete') {
        if (!confirm(`確定刪除 ID ${id}？`)) return;
        if (removeRow(id)) {
          tr.remove();
          setStatus(`ID ${id} 已刪除`, 'ok');
        } else {
          setStatus(`ID ${id} 不存在`, 'err');
        }
      }
    });

    loadRows();
  </script>
</body>
</html>
